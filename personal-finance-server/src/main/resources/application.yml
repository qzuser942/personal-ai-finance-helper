server:
  port: 8080

spring:
  application:
    name: personal-finance-server

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/finance_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.finance.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j Doc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: '用户端接口'
      paths-to-match: '/api/user/**,/api/bill/**,/api/category/**,/api/budget/**,/api/save-target/**,/api/statistics/**,/api/ai/**,/api/file/**'
    - group: '管理员端接口'
      paths-to-match: '/api/admin/**'

knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== JWT ====================
jwt:
  secret: personal-finance-manager-jwt-secret-key-2026-huxianqi-software-2413
  expiration: 86400000
  admin-expiration: 86400000

# ==================== AI Configuration ====================
ai:
  deepseek:
    base-url: http://localhost:11434
    model-name: deepseek-chat
    temperature: 0.7
    max-tokens: 2048
    top-p: 0.9
  qdrant:
    host: localhost
    port: 6334
    collection-name: user_consumption_vectors

# ==================== File Upload ====================
file:
  upload:
    receipt-path: ./uploads/receipts/
    backup-path: ./backups/

# ==================== Logging ====================
logging:
  level:
    root: INFO
    com.finance: DEBUG
  file:
    name: ./logs/personal-finance.log
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
