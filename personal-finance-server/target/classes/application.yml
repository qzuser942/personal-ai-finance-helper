server:
  port: 8080

spring:
  application:
    name: personal-finance-server

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/finance_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.finance.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j Doc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: '用户端接口'
      paths-to-match: '/api/user/**,/api/bill/**,/api/category/**,/api/budget/**,/api/save-target/**,/api/statistics/**,/api/ai/**,/api/file/**'
    - group: '管理员端接口'
      paths-to-match: '/api/admin/**'

knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== JWT ====================
jwt:
  secret: personal-finance-manager-jwt-secret-key-2026-huxianqi-software-2413
  expiration: 86400000
  admin-expiration: 86400000

# ==================== AI Configuration ====================
ai:
  deepseek:
    # DeepSeek 官方 API Key（支持环境变量 DEEPSEEK_API_KEY 覆盖）
    api-key: ${DEEPSEEK_API_KEY:sk-your-deepseek-api-key}
    # DeepSeek 官方 API 地址（OpenAI 兼容接口）
    base-url: https://api.deepseek.com/v1
    # 模型名称：deepseek-chat / deepseek-reasoner
    model-name: deepseek-chat
    # 温度参数（0-2），越高越随机
    temperature: 0.7
    # 最大输出 Token 数
    max-tokens: 4096
    # 核采样参数（0-1）
    top-p: 0.9
    # API 调用超时时间
    timeout: 120s
    # 失败重试次数
    max-retries: 3

  alicloud:
    # 阿里云百炼 DashScope API Key（支持环境变量 DASHSCOPE_API_KEY 覆盖）
    dashscope-api-key: ${DASHSCOPE_API_KEY:sk-your-dashscope-api-key}
    # 嵌入模型名称
    embedding-model: text-embedding-v2
    # 向量维度（text-embedding-v2 = 1536）
    embedding-dimension: 1536
    # DashScope 文本嵌入 API 端点
    embedding-base-url: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding

  qdrant:
    # Qdrant 服务地址
    host: ${QDRANT_HOST:localhost}
    # Qdrant gRPC 端口（默认 6334）
    port: ${QDRANT_GRPC_PORT:6334}
    # 向量集合名称
    collection-name: user_consumption_vectors
    # 是否启用 TLS
    use-tls: false

# ==================== Resilience4j Retry ====================
resilience4j:
  retry:
    instances:
      llmService:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - java.io.IOException
  timelimiter:
    instances:
      llmService:
        timeout-duration: 120s

# ==================== File Upload ====================
file:
  upload:
    receipt-path: ./uploads/receipts/
    backup-path: ./backups/

# ==================== Logging ====================
logging:
  level:
    root: INFO
    com.finance: DEBUG
  file:
    name: ./logs/personal-finance.log
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
